apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: demoproject-platform-alerts
  namespace: monitoring
  labels:
    release: kube-prometheus-stack
spec:
  groups:
    - name: demoproject.node.rules
      rules:
        - alert: NodeCPUHigh
          expr: 100 * (1 - avg by (instance) (rate(node_cpu_seconds_total{mode="idle"}[5m]))) > 80
          for: 10m
          labels: { severity: warning }
          annotations:
            summary: "CPU usage exceeds 80% on {{ $labels.instance }}"
            description: "CPU has been above 80% for 10 minutes; current value is {{ $value | printf \"%.1f\" }}%."
        - alert: NodeMemoryHigh
          expr: 100 * (1 - node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) > 85
          for: 10m
          labels: { severity: warning }
          annotations:
            summary: "Memory usage exceeds 85% on {{ $labels.instance }}"
            description: "Available memory has remained below 15% for 10 minutes."
        - alert: NodeFilesystemAlmostFull
          expr: 100 * (1 - node_filesystem_avail_bytes{fstype!~"tmpfs|overlay|squashfs"} / node_filesystem_size_bytes{fstype!~"tmpfs|overlay|squashfs"}) > 90
          for: 15m
          labels: { severity: critical }
          annotations:
            summary: "Filesystem usage exceeds 90% on {{ $labels.instance }}"
            description: "Mount {{ $labels.mountpoint }} requires immediate capacity action."
        - alert: KubernetesNodeDown
          expr: up{job="node-exporter"} == 0
          for: 5m
          labels: { severity: critical }
          annotations:
            summary: "Node exporter is unreachable on {{ $labels.instance }}"
            description: "The node or exporter has been unavailable for five minutes."
    - name: demoproject.workload.rules
      rules:
        - alert: PodRestartingFrequently
          expr: increase(kube_pod_container_status_restarts_total[15m]) > 3
          for: 5m
          labels: { severity: warning }
          annotations:
            summary: "Container {{ $labels.container }} is restarting"
            description: "Pod {{ $labels.namespace }}/{{ $labels.pod }} restarted more than three times in 15 minutes."

