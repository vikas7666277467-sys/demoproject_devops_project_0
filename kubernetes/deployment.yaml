apiVersion: apps/v1

kind: Deployment

metadata:
  name: flask-deployment
  namespace: demo

spec:
  replicas: 2

  strategy:
    type: RollingUpdate

    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0

  selector:
    matchLabels:
      app: flask

  template:

    metadata:

      labels:
        app: flask

    spec:

      containers:

      - name: flask

        image: demoproject/flask-app:latest

        imagePullPolicy: Always

        ports:

        - containerPort: 5000

        resources:

          requests:
            cpu: "100m"
            memory: "128Mi"

          limits:
            cpu: "500m"
            memory: "512Mi"

        livenessProbe:

          httpGet:

            path: /health

            port: 5000

          initialDelaySeconds: 30

          periodSeconds: 10

        readinessProbe:

          httpGet:

            path: /health

            port: 5000

          initialDelaySeconds: 10

          periodSeconds: 5
